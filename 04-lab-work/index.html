<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Динамическая таблица. Вариант 1</title>
    <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>
<div class="container">
    <h1>Управление таблицей (вариант 14)</h1>
    <div class="controls">
        <label>Строки (1-50): <input type="number" id="rowsInput" min="1" max="50" value="4"></label>
        <label>Столбцы (1-50): <input type="number" id="colsInput" min="1" max="50" value="6"></label>
        <input type="button" id="createBtn" value="Создать таблицу">
        <input type="button" id="resetBtn" value="Сброс к исходной">
    </div>

    <div id="tableContainer" class="table-container"></div>

    <div class="actions">
        <h3>Действие 1: Удалить строки с суммой меньше</h3>
        <label>Порог: <input type="number" id="threshold" value="200"></label>
        <input type="button" id="action1Btn" value="Удалить строки">

        <h3>Действие 2: Заполнить синие ячейки</h3>
        <label><input type="radio" name="sumavg" value="sum" checked> Сумма всех чисел</label>
        <label><input type="radio" name="sumavg" value="avg"> Среднее арифметическое</label>
        <input type="button" id="action2Btn" value="Применить">

        <h3>Действие 3: Отразить строки зеркально по вертикали</h3>
        <input type="button" id="action3Btn" value="Отразить">
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
