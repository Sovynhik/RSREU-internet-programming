<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Динамическая таблица. Вариант 14</title>
    <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>
<div class="container">
    <h1>Управление таблицей (вариант 14)</h1>
    <div class="controls">
        <label>Строки (1-50): <input type="number" id="rowsInput" min="1" max="50" value="4"></label>
        <label>Столбцы (1-50): <input type="number" id="colsInput" min="1" max="50" value="6"></label>
        <input type="button" id="createBtn" value="Создать таблицу">
        <input type="button" id="resetBtn" value="Сброс к исходной">
    </div>

    <div id="tableContainer" class="table-container"></div>

    <div class="actions">
        <h3>Действие 1: Заполнить красные ячейки</h3>
        <label><input type="radio" name="sumavgRed" value="sum" checked> Сумма всех чисел</label>
        <label><input type="radio" name="sumavgRed" value="avg"> Среднее арифметическое</label>
        <input type="button" id="action1Btn" value="Применить">

        <h3>Действие 2: Убрать цвет ячеек для строк</h3>
        <label>Номера строк (через запятую): <input type="text" id="rowsToExclude" placeholder="например: 1,3"></label>
        <input type="button" id="action2Btn" value="Убрать цвет">

        <h3>Действие 3: Повернуть таблицу на 90° вправо</h3>
        <input type="button" id="action3Btn" value="Повернуть">
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
