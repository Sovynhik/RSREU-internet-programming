<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЛР6 Вариант 4: Детали</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <h1>Лабораторная работа №6, Вариант 4</h1>
    <h2>Массив объектов «Детали»</h2>

    <div class="controls">
        <div class="param-group">
            <label>Количество деталей (N):</label>
            <input type="number" id="countInput" min="1" max="20" value="5">
        </div>
        <div class="param-group">
            <label>Порог массы для удаления материала:</label>
            <input type="number" id="massThreshold" value="10" step="0.1">
        </div>
        <button id="generateBtn">Сгенерировать</button>
        <button id="deleteMaterialBtn">Удалить материал (масса < порога)</button>
        <button id="addVolumeBtn">Добавить габаритный объём</button>
        <button id="sortBtn">Сортировать по убыванию массы</button>
        <button id="saveBtn">Сохранить в JSON</button>
        <button id="loadBtn">Загрузить из JSON</button>
        <input type="file" id="loadFile" accept=".json" style="display:none;">
    </div>

    <div class="tables">
        <div class="table-block">
            <h3>Исходные детали</h3>
            <div id="originalTable" class="table-container"></div>
        </div>
        <div class="table-block">
            <h3>После удаления материала</h3>
            <div id="afterDeleteTable" class="table-container"></div>
        </div>
        <div class="table-block">
            <h3>После добавления объёма</h3>
            <div id="afterVolumeTable" class="table-container"></div>
        </div>
        <div class="table-block">
            <h3>Отсортировано по массе (убыв.)</h3>
            <div id="sortedTable" class="table-container"></div>
        </div>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
